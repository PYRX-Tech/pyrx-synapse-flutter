name: pyrx_synapse_android
description: >-
  Android implementation of the PYRX Synapse Flutter SDK. Bridges Dart calls
  to the published `tech.pyrx.synapse:synapse-core` and `:synapse-push` Kotlin
  SDKs from Maven Central, and forwards the SDK's SharedFlow<PyrxEvent>
  observer surface to Dart through Pigeon-generated event channels.
version: 0.1.0
homepage: https://github.com/PYRX-Tech/pyrx-synapse-flutter
repository: https://github.com/PYRX-Tech/pyrx-synapse-flutter
issue_tracker: https://github.com/PYRX-Tech/pyrx-synapse-flutter/issues

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.7
  pyrx_synapse_platform_interface: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    implements: pyrx_synapse
    platforms:
      android:
        package: tech.pyrx.synapse.flutter
        pluginClass: PyrxSynapsePlugin
        dartPluginClass: PyrxSynapseAndroid
