name: pyrx_synapse_ios
description: >-
  iOS implementation of the PYRX Synapse Flutter SDK. Bridges Dart calls to
  the published `PYRXSynapse` Swift SDK from CocoaPods Trunk / SPM, and
  forwards the SDK's AsyncStream<PyrxEvent> observer surface to Dart through
  Pigeon-generated event channels.
version: 0.2.0
homepage: https://github.com/PYRX-Tech/pyrx-synapse-flutter
repository: https://github.com/PYRX-Tech/pyrx-synapse-flutter
issue_tracker: https://github.com/PYRX-Tech/pyrx-synapse-flutter/issues
documentation: https://pub.dev/documentation/pyrx_synapse_ios/latest/
topics:
  - pyrx
  - synapse
  - ios
  - push-notifications

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.7
  pyrx_synapse_platform_interface: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    implements: pyrx_synapse
    platforms:
      ios:
        pluginClass: PyrxSynapsePlugin
        dartPluginClass: PyrxSynapseIos
