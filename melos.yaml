name: pyrx_synapse_workspace

packages:
  - packages/**

# `melos` 8.x removed top-level `command:` shortcut keys for `bootstrap`
# (see https://melos.invertase.dev/). Bootstrap defaults work fine for our
# four-package layout — `melos bootstrap` will `flutter pub get` each
# package in dependency order and wire up local path overrides.

scripts:
  # --- Quality gates ---------------------------------------------------------
  analyze:
    description: Run flutter analyze across every package.
    exec: flutter analyze .

  format:
    description: Verify Dart formatting (no changes written).
    exec: dart format --output none --set-exit-if-changed .

  format-fix:
    description: Apply Dart formatting in place.
    exec: dart format .

  test:
    description: Run flutter test in every package that has tests.
    run: melos exec --dir-exists="test" --order-dependents -- "flutter test"

  # --- Pigeon codegen --------------------------------------------------------
  pigeon-generate:
    description: |
      Regenerate every Pigeon-managed file in the platform-interface package.
      Generated files are committed to git — re-run this script after editing
      the Pigeon spec at packages/pyrx_synapse_platform_interface/pigeons/.
    run: |
      cd packages/pyrx_synapse_platform_interface && \
        dart pub global run pigeon --input pigeons/pyrx_synapse_messages.dart

  pigeon-check:
    description: |
      CI guard. Re-runs Pigeon and fails if the working tree changes —
      i.e. somebody edited the Pigeon spec without committing the
      regenerated outputs.
    run: |
      melos run pigeon-generate && \
        git diff --exit-code -- '*.g.dart' '*.g.swift' '*.g.kt'
